<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" rel="stylesheet">
    <title>외계통신 - 비밀번호 재설정</title>
    <style>
        body { 
            font-family:"Dongle", sans-serif;  
            background-color: #0b0e14; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; }
        .reset-box { 
            background: #161b22; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #fb8c00; 
            width: 350px; }
        h2 { 
            color: #fb8c00;
            font-size:3rem; 
            text-align: center; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #fb8c00; 
            color: #0b0e14; 
            border: none; 
            border-radius: 6px; 
            font-family: "Dongle", sans-serif;
            font-size:2rem;
            font-weight: bold; 
            cursor: pointer; }
        .error { 
            color: #ff7b72; 
            text-align: center; 
            margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2>새 비밀번호 설정</h2>
        <p style="text-align: center; color: #00ffcc; font-size:1.5rem; font-weight: bold;">대상: {{ user_id }}</p>

        {% if error %}
            <p class="error">⚠️ {{ error }}</p>
        {% endif %}

        <form action="/reset-pw" method="POST">
            
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <input type="password" name="new_password" placeholder="새로운 비밀번호" required>
            <input type="password" name="confirm_password" placeholder="비밀번호 확인" required>
            <button type="submit">비밀번호 변경 완료</button>
        </form>
    </div>
</body>
</html>
